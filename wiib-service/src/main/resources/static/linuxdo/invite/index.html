<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinuxDo 邀请码</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #faf8f5;
            --surface: #ffffff;
            --border: #e8e2d9;
            --text: #2c2416;
            --text-secondary: #7a7060;
            --text-muted: #b0a898;
            --accent: #d4622a;
            --accent-light: #fdf0e9;
            --success: #4a8c5e;
            --success-bg: #eef5f0;
            --error: #c0392b;
            --error-bg: #fdf0ee;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 1;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px 40px;
            box-shadow: 0 1px 3px rgba(44, 36, 22, 0.04), 0 8px 24px rgba(44, 36, 22, 0.06);
        }

        .header {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            background: var(--accent);
            border-radius: 12px;
            margin-bottom: 20px;
            color: white;
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 28px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--success);
            flex-shrink: 0;
        }

        .status-dot.offline {
            background: var(--error);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 8px;
        }

        .input {
            width: 100%;
            padding: 13px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: inherit;
            font-size: 15px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .input::placeholder {
            color: var(--text-muted);
        }

        .input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn {
            width: 100%;
            padding: 13px 24px;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            color: white;
            font-family: inherit;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
        }

        .btn:hover:not(:disabled) {
            background: #bf5825;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(212, 98, 42, 0.25);
        }

        .btn:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: none;
        }

        .btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-loading {
            position: relative;
            color: transparent;
        }

        .btn-loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 18px;
            height: 18px;
            margin: -9px 0 0 -9px;
            border: 2px solid rgba(255,255,255,0.35);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .message {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-top: 16px;
            display: none;
            animation: fadeIn 0.25s ease;
        }

        .message.show { display: block; }

        .message.success {
            background: var(--success-bg);
            border: 1px solid rgba(74, 140, 94, 0.2);
            color: var(--success);
        }

        .message.error {
            background: var(--error-bg);
            border: 1px solid rgba(192, 57, 43, 0.15);
            color: var(--error);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .code-display {
            display: none;
            text-align: center;
            padding: 20px 0 8px;
        }

        .code-display.show {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        .code-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .code-value {
            font-family: 'Courier New', monospace;
            font-size: 30px;
            font-weight: 700;
            letter-spacing: 5px;
            color: var(--accent);
            padding: 18px 28px;
            background: var(--accent-light);
            border: 1px solid rgba(212, 98, 42, 0.15);
            border-radius: 12px;
            display: inline-block;
            cursor: pointer;
            transition: all 0.2s;
            user-select: all;
            word-break: break-all;
            text-align: center;
        }

        .code-value:hover {
            background: #fde8d9;
            transform: scale(1.01);
        }

        .code-hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 10px;
            transition: color 0.2s;
        }

        .code-value.copied + .code-hint {
            color: var(--success);
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 28px 0;
        }

        .rules {
            margin-bottom: 28px;
        }

        .rules-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .rules-list {
            list-style: none;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.7;
        }

        .rules-list li {
            padding: 2px 0;
            padding-left: 16px;
            position: relative;
        }

        .rules-list li::before {
            content: '·';
            position: absolute;
            left: 0;
            color: var(--accent);
            font-weight: 700;
        }

        .records-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .records-list {
            max-height: 180px;
            overflow-y: auto;
        }

        .records-empty {
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            padding: 16px 0;
        }

        .record-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            font-size: 13px;
            color: var(--text-secondary);
            background: var(--bg);
            border-radius: 6px;
            margin-bottom: 4px;
        }

        .record-email {
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .record-time {
            font-size: 11px;
            color: var(--text-muted);
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .footer a {
            color: var(--text-secondary);
            text-decoration: underline;
            text-decoration-color: var(--border);
            text-underline-offset: 3px;
            transition: color 0.2s, text-decoration-color 0.2s;
        }

        .footer a:hover {
            color: var(--accent);
            text-decoration-color: var(--accent);
        }

        .click-section {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
            margin-bottom: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .click-btn {
            flex: 1;
            padding: 11px 20px;
            background: var(--accent-light);
            border: 1px solid rgba(212, 98, 42, 0.2);
            border-radius: 10px;
            color: var(--accent);
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .click-btn:hover:not(:disabled) {
            background: #fde8d9;
        }

        .click-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .click-count {
            flex: 1;
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
            text-align: right;
        }

        @media (max-width: 520px) {
            .card { padding: 36px 24px; border-radius: 12px; }
            .title { font-size: 24px; }
            .code-value { font-size: 24px; letter-spacing: 3px; padding: 14px 20px; }
            .logo { width: 46px; height: 46px; font-size: 22px; border-radius: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="logo">L</div>
                <h1 class="title">LinuxDo 邀请码</h1>
                <p class="subtitle">输入邮箱，获取你的专属邀请链接</p>
            </div>

            <div class="status-bar">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">检查库存中...</span>
            </div>

            <div id="applyForm">
                <div class="form-group">
                    <label class="label">邮箱地址</label>
                    <input
                        type="email"
                        class="input"
                        id="emailInput"
                        placeholder="your@email.com"
                        autocomplete="email"
                    >
                </div>

                <button class="btn" id="submitBtn" disabled>
                    <span id="btnText">申请邀请码</span>
                </button>
            </div>

            <div class="code-display" id="codeDisplay">
                <div class="code-label">你的邀请码</div>
                <div class="code-value" id="codeValue" onclick="copyCode()"></div>
                <div class="code-hint" id="codeHint">点击复制</div>
            </div>

            <div class="message" id="message"></div>

            <div class="divider"></div>

            <div class="rules">
                <div class="rules-title">申请须知</div>
                <ul class="rules-list">
                    <li>每个邮箱限领一次，验证链接 30 分钟内有效</li>
                    <li>本站规则不代表 Linux Do 社区规则，请以官网为准</li>
                </ul>
            </div>

            <div class="click-section">
                <button class="click-btn" id="clickBtn">让我知道你需要邀请码</button>
                <span class="click-count" id="clickCount">-</span>
            </div>

            <div class="records">
                <div class="records-title">
                    <span>最近领取</span>
                    <span id="totalRecords" style="font-weight:400;text-transform:none;letter-spacing:0;margin-left:6px;color:var(--text-secondary);font-size:11px;"></span>
                </div>
                <div class="records-list" id="recordsList">
                    <div class="records-empty">加载中...</div>
                </div>
            </div>
        </div>

        <div class="footer">
            <a href="https://linux.do" target="_blank">linux.do</a> · mawai
        </div>
    </div>

    <script>
        const API_BASE = '/api/invite';
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const emailInput = document.getElementById('emailInput');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const message = document.getElementById('message');
        const applyForm = document.getElementById('applyForm');
        const codeDisplay = document.getElementById('codeDisplay');
        const codeValue = document.getElementById('codeValue');
        const codeHint = document.getElementById('codeHint');

        let isLoading = false;

        window.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');

            if (token) {
                await verifyToken(token);
            } else {
                await checkStatus();
                await loadRecentRecords();
            }
            await loadClicks();
        });

        async function checkStatus() {
            try {
                const res = await fetch(`${API_BASE}/status`);
                const data = await res.json();

                if (data.code === 0 && data.data === true) {
                    statusDot.className = 'status-dot';
                    statusText.textContent = '邀请码充足';
                    submitBtn.disabled = false;
                } else {
                    statusDot.className = 'status-dot offline';
                    statusText.textContent = '暂无库存';
                    submitBtn.disabled = true;
                }
            } catch (e) {
                statusDot.className = 'status-dot offline';
                statusText.textContent = '网络错误';
            }
        }

        async function verifyToken(token) {
            statusText.textContent = '验证中...';
            applyForm.style.display = 'none';

            try {
                const res = await fetch(`${API_BASE}/verify?token=${encodeURIComponent(token)}`);
                const data = await res.json();

                if (data.code === 0 && data.data) {
                    statusDot.className = 'status-dot';
                    statusText.textContent = '验证成功';
                    codeValue.textContent = data.data;
                    codeDisplay.classList.add('show');
                    showMessage('success', '邀请码领取成功，请妥善保管');
                    await loadRecentRecords();
                } else {
                    statusDot.className = 'status-dot offline';
                    statusText.textContent = '验证失败';
                    showMessage('error', data.msg || '链接已失效或无效');
                    applyForm.style.display = 'block';
                    await checkStatus();
                    await loadRecentRecords();
                }
            } catch (e) {
                statusDot.className = 'status-dot offline';
                statusText.textContent = '网络错误';
                showMessage('error', '网络错误，请刷新重试');
                applyForm.style.display = 'block';
                await loadRecentRecords();
            }
        }

        async function submitApply() {
            const email = emailInput.value.trim();

            if (!email) {
                showMessage('error', '请输入邮箱地址');
                return;
            }

            if (!/^[\w.-]+@[\w.-]+\.[a-zA-Z]{2,}$/i.test(email)) {
                showMessage('error', '邮箱格式不正确');
                return;
            }

            if (isLoading) return;
            isLoading = true;
            submitBtn.disabled = true;
            submitBtn.classList.add('btn-loading');

            try {
                const res = await fetch(`${API_BASE}/apply?email=${encodeURIComponent(email)}`, {
                    method: 'POST'
                });
                const data = await res.json();

                if (data.code === 0) {
                    showMessage('success', '申请成功，请查收邮件并点击验证链接');
                    emailInput.disabled = true;
                    btnText.textContent = '已发送';
                } else {
                    showMessage('error', data.msg || data.message || '申请失败');
                    submitBtn.disabled = false;
                }
            } catch (e) {
                showMessage('error', '网络错误，请稍后重试');
                submitBtn.disabled = false;
            } finally {
                isLoading = false;
                submitBtn.classList.remove('btn-loading');
            }
        }

        function showMessage(type, text) {
            message.className = `message ${type} show`;
            message.textContent = text;
        }

        function copyCode() {
            const code = codeValue.textContent;
            navigator.clipboard.writeText(code).then(() => {
                codeValue.classList.add('copied');
                codeHint.textContent = '已复制';
                setTimeout(() => {
                    codeValue.classList.remove('copied');
                    codeHint.textContent = '点击复制';
                }, 2000);
            });
        }

        submitBtn.addEventListener('click', submitApply);
        emailInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submitApply();
        });

        async function loadRecentRecords() {
            const recordsList = document.getElementById('recordsList');
            const totalEl = document.getElementById('totalRecords');
            try {
                const res = await fetch(`${API_BASE}/records?limit=10`);
                const data = await res.json();

                if (data.code === 0 && data.data && data.data.list && data.data.list.length > 0) {
                    totalEl.textContent = `共${data.data.total}人领取过`;
                    recordsList.innerHTML = data.data.list.map(record => {
                        const date = new Date(record.claimedAt);
                        const timeStr = formatTime(date);
                        return `
                            <div class="record-item">
                                <span class="record-email">${record.maskedIdentifier}</span>
                                <span class="record-time">${timeStr}</span>
                            </div>
                        `;
                    }).join('');
                } else {
                    totalEl.textContent = data.data && data.data.total > 0 ? `共${data.data.total}人领取过` : '';
                    recordsList.innerHTML = '<div class="records-empty">暂无记录</div>';
                }
            } catch (e) {
                totalEl.textContent = '';
                recordsList.innerHTML = '<div class="records-empty">加载失败</div>';
            }
        }

        async function loadClicks() {
            const clickCountEl = document.getElementById('clickCount');
            try {
                const res = await fetch(`${API_BASE}/clicks`);
                const data = await res.json();
                if (data.code === 0) {
                    clickCountEl.textContent = data.data + ' 次点击';
                }
            } catch (e) {
                clickCountEl.textContent = '-';
            }
        }

        let clickLoading = false;
        document.getElementById('clickBtn').addEventListener('click', async () => {
            const btn = document.getElementById('clickBtn');
            const countEl = document.getElementById('clickCount');
            if (clickLoading) return;
            clickLoading = true;
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/click`, { method: 'POST' });
                const data = await res.json();
                if (data.code === 0) {
                    btn.textContent = '已记录 ✓';
                    let current = parseInt(countEl.textContent) || 0;
                    countEl.textContent = (current + 1) + ' 次点击';
                    setTimeout(() => {
                        btn.textContent = '让我知道你需要邀请码';
                        btn.disabled = false;
                        clickLoading = false;
                    }, 200);
                    return;
                } else {
                    showMessage('error', data.msg || '操作过于频繁，请稍后再试');
                    setTimeout(() => {
                        btn.textContent = '让我知道你需要邀请码';
                        btn.disabled = false;
                        clickLoading = false;
                    }, 500);
                }
            } catch (e) {
                btn.disabled = false;
                clickLoading = false;
            }
        });

        function formatTime(date) {
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);

            if (diff < 60) return '刚刚';
            if (diff < 3600) return Math.floor(diff / 60) + ' 分钟前';
            if (diff < 86400) return Math.floor(diff / 3600) + ' 小时前';
            if (diff < 2592000) return Math.floor(diff / 86400) + ' 天前';

            const month = date.getMonth() + 1;
            const day = date.getDate();
            return `${month}月${day}日`;
        }
    </script>
</body>
</html>
