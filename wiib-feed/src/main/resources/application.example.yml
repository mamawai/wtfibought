server:
  port: 8081

spring:
  application:
    name: wiib-feed
  threads:
    virtual:
      enabled: true
  # K线落库（KlineStreamCache → common.KlineHistoryStore）
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/wiib?reWriteBatchedInserts=true
    username:
    password:
    hikari:
      pool-name: wiib-feed-hikari
      maximum-pool-size: 6
      minimum-idle: 2
      connection-timeout: 30000
  # 行情总线
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:
      timeout: 10000

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    tags:
      application: wiib-feed

# Binance行情配置（WS 接入 + REST 回填）
binance:
  ws-url: wss://stream.binance.com:9443/ws
  futures-ws-url: wss://fstream.binance.com/ws
  rest-base-url: https://api.binance.com
  futures-rest-base-url: https://fapi.binance.com
  symbols:
    - BTCUSDT
    - PAXGUSDT
    - ETHUSDT
    - DOGEUSDT
    - SOLUSDT
    - XRPUSDT
  fallback-poll-interval: 5000

# 内部 API 鉴权：/internal/streams 由共享 InternalApiFilter 校验；须与 sim/quant 同值
internal:
  api:
    token: ${INTERNAL_API_TOKEN:}
