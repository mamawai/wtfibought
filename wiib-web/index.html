<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180.png" />
    <!-- viewport-fit=cover：iOS 装成 PWA 后全屏，需自行让开刘海/底部横条（安全区内边距见 Layout.tsx） -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <!-- 浏览器里保持品牌橙（安卓 Chrome / iOS Safari 用它染地址栏）；装成 App 后由下方脚本改成顶栏色 -->
    <meta name="theme-color" content="#F97316" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="WIIB" />
    <title>WhatIfIBought</title>
    <script>
      // 阻塞式执行：必须赶在首帧之前定主题，否则暗色用户每次冷启动都要闪一下白
      (function() {
        var dark = localStorage.getItem('theme') === 'dark';
        if (dark) document.documentElement.classList.add('dark');

        // 是否从桌面图标启动：安卓认 display-mode，iOS 只认 navigator.standalone。
        // 打成 html.pwa 供 CSS 用（不走 @media display-mode，iOS 支持度没把握）
        var pwa = matchMedia('(display-mode: standalone)').matches || navigator.standalone === true;
        if (pwa) document.documentElement.classList.add('pwa');

        // 状态栏色：App 内跟顶栏同色才不割裂；浏览器里维持品牌橙。
        // 放这儿是因为晚到 React 挂载会先闪一下旧色。取值须同 index.css 的 --color-card
        if (pwa) {
          document.querySelector('meta[name="theme-color"]')
            .setAttribute('content', dark ? '#13151a' : '#ffffff');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
