server:
  port: 8082

spring:
  # 本地开发密钥来源：根目录 .env.local（从根目录跑命中第一条；IDEA 工作目录=模块目录命中第二条）
  # 线上容器内无此文件，optional 自动跳过，占位符由 docker-compose env_file 注入的环境变量解析
  config:
    import:
      - optional:file:.env.local[.properties]
      - optional:file:../.env.local[.properties]
  ai:
    # MCP server（P6）：SSE endpoint 默认 /sse，Claude Desktop 等 MCP 客户端可直连调量化工具
    mcp:
      server:
        name: wiib-quant
        version: 1.0.0
        type: SYNC
        instructions: "WhatIfIBought 量化只读工具：市场快照/脆弱度/期权IV/vol预测/regime/验证记分卡"
    # RetryTemplate 独立装配，AiAgentRuntimeManager 手建模型时注入，仍然生效
    retry:
      max-attempts: 10
      backoff:
        initial-interval: 1000
        multiplier: 2
        max-interval: 30000
    # 关闭 OpenAI 全部6类模型自动装配（各自独立开关，只关chat其余仍会因缺api-key拒绝启动）：
    # LLM 配置唯一来源是 DB，AiAgentRuntimeManager 启动读取手建
    model:
      chat: none
      embedding: none
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none
  application:
    name: wiib-quant
  # 启用虚拟线程支持（量化采集 / Graph 节点并行）
  threads:
    virtual:
      enabled: true
  # 数据源：与 sim 共享同一 PostgreSQL（quant forecast/factor/strategy 落库）；连接参数全部来自 .env
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${PG_HOST:localhost}:${PG_PORT:5432}/${PG_DB:wiib}?reWriteBatchedInserts=true
    username: ${PG_USER}
    password: ${PG_PASSWORD}
    hikari:
      pool-name: wiib-quant-hikari
      maximum-pool-size: 8
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 550000
  # 行情总线：消费 feed 写入的 kline/markprice Stream + depth/orderflow KV
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:0}
      password: ${REDIS_PASSWORD:}
      timeout: 10000

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    tags:
      application: wiib-quant

# 主决策周期：M1/M3/M5/M15/H1（QuantGraphFactory 读此项决定主 timeframe；原属 sim TradingConfig，quant 拆出后独立保留）
trading:
  decision-interval: M5

# AI 分析轨总开关：关掉后快照/深研判/预测验证不再自动跑（bar 收盘、哨兵异动、兜底 cron 全静默），
# Admin 页手动触发不受影响。只管这一轨——因子采集归 factor.*.enabled，策略与下单归下面 strategy.*
# 注意跟 quant.deep-analysis.* 区分：那两项是本轨内部深研判的定频与冷却，此项是整轨开关
quant:
  analysis:
    enabled: false

# 插拔式策略实盘信号运行时：默认关闭；启用后读取实时流并记录 LIVE 信号
strategy:
  runtime:
    enabled: true
    enabled-ids: FIBO,LIQFADE,SQZMOM,TURTLE   # 四策略全启，各自部署篮子见 StrategyConfig
    liquidation-window-minutes: 30
    liquidation-threshold-usdt: 500000
  execution:
    enabled: true           # 执行总开关：当前=开，正在往下面 target 真下单（代码 @Value 默认为 false）
    target: sim              # sim=本平台模拟盘(每策略独立账户 quant-<ID>) | testnet=Binance Testnet
    # 执行白名单=四策略部署篮子并集(FIBO:BTC/ETH · LIQFADE:BTC/ETH/DOGE · SQZMOM:SOL/DOGE/XRP · TURTLE:SOL/ETH/DOGE/BNB)
    symbols: BTCUSDT,ETHUSDT,DOGEUSDT,SOLUSDT,XRPUSDT,BNBUSDT
    fixed-margin-usdt: 50    # 每仓固定保证金 USDT(testnet 轨用；sim 轨为风险定量)
    leverage: 20             # testnet 轨请求杠杆
    sim:
      leverage: 20           # sim 轨请求杠杆；实际 = min(此值, 各策略 riskPolicy.maxLeverage)
    order-timeout-bars: 12   # 挂单超时(5m 根数，对齐 FiboParams)

# Binance行情配置（quant 仅用 REST 拉历史/testnet；不连 WS，BinanceWsClient 在 feed）
binance:
  ws-url: wss://stream.binance.com:9443/ws
  futures-ws-url: wss://fstream.binance.com/ws
  rest-base-url: https://api.binance.com
  futures-rest-base-url: https://fapi.binance.com
  symbols:
    - BTCUSDT
    - ETHUSDT
    - DOGEUSDT
    - SOLUSDT
    - XRPUSDT
  fallback-poll-interval: 5000

# Binance USDT-M Testnet：策略实盘执行下单走 testnet（行情仍主网）；key 不填则 testnet 轨不可用，sim 轨不受影响
binance-testnet:
  rest-base-url: https://demo-fapi.binance.com
  api-key: ${BINANCE_TESTNET_API_KEY:}
  secret-key: ${BINANCE_TESTNET_SECRET_KEY:}
  symbols:
    - ETHUSDT
    - BTCUSDT

# BlockBeats(律动)重要快讯 API（NewsCache 懒加载用；免费额度为一次性总量、不回血；不填则新闻功能降级）
blockbeats:
  api-key: ${BLOCKBEATS_API_KEY:}
  base-url: https://api-pro.theblockbeats.info
  lang: cn
  size: 20
  expiry-ms: 600000           # 复用窗口 10min：窗口内多币种/多次调用复用同一份，超过才重拉

# quant → sim internal API：SimInternalClient 读用户行为数据（behavior agent），须与 sim 同 token
# 三进程读同一 .env，默认值也一致，不填即可互通
sim:
  internal:
    base-url: ${SIM_INTERNAL_BASE_URL:http://localhost:8080}
internal:
  api:
    token: ${INTERNAL_API_TOKEN:wiib-internal-dev}

# 框架噪音抑制：MainAgentNodeAction 每次主 agent 用文本收尾都会打"JSON 路由解析失败"WARN+堆栈，
# 这是 1.1.2.0 的 FINISH 判定机制（解析失败=本轮结束），预期路径非故障，压到 ERROR 零损失
logging:
  level:
    com.alibaba.cloud.ai.graph.agent.flow.node.MainAgentNodeAction: error

---
# Redis 主从-哨兵模式（线上高可用，配合 redis-compose.yml 栈）：
# .env 里 SPRING_PROFILES_ACTIVE=sentinel 即启用，经哨兵发现主库、故障自动切换；
# 生效后上面的 REDIS_HOST/REDIS_PORT 被忽略，REDIS_PASSWORD/REDIS_DB 照常生效
spring:
  config:
    activate:
      on-profile: sentinel
  data:
    redis:
      sentinel:
        master: ${REDIS_SENTINEL_MASTER:mymaster}
        nodes: ${REDIS_SENTINEL_NODES:redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379}
