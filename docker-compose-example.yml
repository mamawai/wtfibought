# ============================================================
# WhatIfIBought 三进程部署模板 (feed / sim / quant)
# ============================================================
#   1. cp docker-compose-example.yml docker-compose.yml
#   2. 建 .env（见下方）
#   3. mvn clean package -pl wiib-feed,wiib-quant,wiib-sim -am -DskipTests
#   4. docker compose up -d --build
#
# .env 示例（配置只改这里，compose 本体不用动）:
#   PG_HOST=postgres            # HOST 填法见文末
#   PG_PORT=5432
#   PG_DB=wiib
#   PG_USER=postgres
#   PG_PASSWORD=your_password
#   REDIS_HOST=redis            # HOST 填法见文末
#   REDIS_PORT=6379
#   REDIS_PASSWORD=your_password
#   REDIS_DB=0
#   TZ=Asia/Shanghai            # 可选，默认 Asia/Singapore
#   LINUXDO_REDIRECT_URI=https://your-domain.com/login
#
#   HOST 填法（须容器内可达，写 localhost 会指向容器自己连不上）:
#     PG/Redis 是 wiib-network 上的容器 → 填容器名（redis / postgres）
#     原生装在宿主机 → 填 host.docker.internal（需给服务加 extra_hosts）或宿主机内网 IP
# ============================================================

x-shared-env: &shared-env
  TZ: ${TZ:-Asia/Singapore}
  SPRING_DATASOURCE_URL: jdbc:postgresql://${PG_HOST}:${PG_PORT}/${PG_DB}?reWriteBatchedInserts=true
  SPRING_DATASOURCE_USERNAME: ${PG_USER}
  SPRING_DATASOURCE_PASSWORD: ${PG_PASSWORD}
  SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
  SPRING_DATA_REDIS_PORT: ${REDIS_PORT}
  SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
  SPRING_DATA_REDIS_DATABASE: ${REDIS_DB}

x-svc-base: &svc-base
  restart: unless-stopped
  env_file:
    - .env
  ulimits:
    nproc: 16384
    nofile: 65536
  logging:
    driver: "json-file"
    options:
      max-size: "50m"
      max-file: "3"

services:
  wiib-feed:
    <<: *svc-base
    build: { context: ./wiib-feed, dockerfile: Dockerfile }
    container_name: wiib-feed
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - ./dumps/feed:/dumps      # 各服务独立子目录，避免 PID=1 dump 重名
    environment:
      <<: *shared-env
      SERVER_PORT: 8081
    mem_limit: 3584m
    mem_reservation: 1g
    cpus: "2"

  wiib-sim:
    <<: *svc-base
    build: { context: ./wiib-sim, dockerfile: Dockerfile }
    container_name: wiib-sim
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./dumps/sim:/dumps
    environment:
      <<: *shared-env
      SERVER_PORT: 8080
      FEED_INTERNAL_BASE_URL: http://wiib-feed:8081
      LINUXDO_REDIRECT_URI: ${LINUXDO_REDIRECT_URI:-https://your-domain.com/login}
    mem_limit: 5632m
    mem_reservation: 2g
    cpus: "3"

  wiib-quant:
    <<: *svc-base
    build: { context: ./wiib-quant, dockerfile: Dockerfile }
    container_name: wiib-quant
    ports:
      - "127.0.0.1:8082:8082"
    volumes:
      - ./dumps/quant:/dumps
    environment:
      <<: *shared-env
      SERVER_PORT: 8082
      SIM_INTERNAL_BASE_URL: http://wiib-sim:8080
    mem_limit: 6144m
    mem_reservation: 2g
    cpus: "3"

networks:
  default:
    name: wiib-network
    external: true
