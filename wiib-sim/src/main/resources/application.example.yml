server:
  port: 8080

spring:
  application:
    name: wiib-sim
  # 启用虚拟线程支持
  threads:
    virtual:
      enabled: true
  # 本地部署这里连接的是本地数据源 - docker部署docker-compose覆盖
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/wiib?reWriteBatchedInserts=true
    username:
    password:
    hikari:
      pool-name: wiib-hikari
      # 如果你是4core `4×2+1=9`，取整 10, 如果你是2core 用5
      maximum-pool-size: 10
      # HikariCP 官方建议 min=max，避免连接抖动
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 550000
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:
      timeout: 10000

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    tags:
      application: wiib-sim

# AI 配置已迁 DB（每日行情/新闻生成用）：ai_runtime_config + ai_model_assignment('sim' 功能位)，Admin 页管理

# LinuxDo OAuth配置
linuxdo:
  client-id:
  client-secret:
  redirect-uri:


# 交易配置
trading:
  # 合约 AI 主决策周期：M1/M3/M5/M15/H1（影响 K 线采集 / 指标计算 / 回测聚合系数）
  # 新用户初始余额
  initial-balance: 100000
  # 手续费率（0.05%）
  commission-rate: 0.0005
  # 市价单滑点保护（±2%）
  # 限价单最长有效期（小时）
  limit-order-max-hours: 24
  # 乐观锁最大重试次数
  # 限价单并发处理配置
  limit-order-processing:
    max-concurrency: 15
    order-timeout-seconds: 6
  # 是否启用交易时段限制（游戏模式可关闭）
  trading-hours-enabled: true
  # 交易时段（仅当trading-hours-enabled=true时生效）
  trading-hours:
    morning-start: "09:30"
    morning-end: "11:30"
    afternoon-start: "13:00"
    afternoon-end: "15:00"

# Binance行情配置
binance:
  ws-url: wss://stream.binance.com:9443/ws
  futures-ws-url: wss://fstream.binance.com/ws
  rest-base-url: https://api.binance.com
  futures-rest-base-url: https://fapi.binance.com
  symbols:
    - BTCUSDT
    - PAXGUSDT
    - ETHUSDT
    - DOGEUSDT
    - SOLUSDT
    - XRPUSDT
  fallback-poll-interval: 5000

# Binance USDT-M 合约 Testnet 模拟交易（仅交易；行情仍走上方主网 binance.*）
# api-key/secret-key 在 https://testnet.binancefuture.com/ 申请
binance-testnet:
  rest-base-url: https://demo-fapi.binance.com
  api-key: ""
  secret-key: ""
  symbols:
    - ETHUSDT
    - BTCUSDT

# WebSocket配置
websocket:
  # 最大连接数
  max-connections: 10000
  # 心跳间隔（秒）
  heartbeat-interval: 15
  # 是否强制认证
  require-auth: false

# 内部服务间 API 鉴权（quant 调 sim 的 /internal/** 须带 X-Internal-Token）；token 须与 quant/feed 侧一致
internal:
  api:
    token: ${INTERNAL_API_TOKEN:}

# sim → feed 内部调用（FeedInternalClient：拉 WS 流健康快照 + 转发手动重试）
feed:
  internal:
    base-url: ${FEED_INTERNAL_BASE_URL:http://localhost:8081}
